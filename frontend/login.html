<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container">
<main class="min-h-screen flex items-center justify-center p-6 sm:p-12 relative overflow-hidden">
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[30%] h-[30%] bg-tertiary-container/5 rounded-full blur-[100px]"></div>
</div>
<div class="w-full max-w-md z-10">
<div class="text-center mb-12">
<img src="image_0.png" alt="Fluxa Logo" class="h-30 w-auto mx-auto mb-6 object-contain">
<h1 class="text-4xl font-black tracking-tighter text-on-surface mb-2">Fluxa</h1>
<p class="text-secondary font-medium tracking-tight">Endüstriyel Veri Terminali</p>
</div>
<div class="bg-surface-container-lowest p-8 sm:p-10 rounded-xl shadow-[0_32px_64px_-12px_rgba(23,28,31,0.06)]">
<form class="space-y-8" onsubmit="return false;">
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="email">E-mail</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">alternate_email</span>
<input class="w-full pl-8 pr-4 py-3 bg-transparent border-b-2 border-surface-container-high focus:border-primary focus:ring-0 text-on-surface font-medium transition-all placeholder:text-outline-variant" id="email" placeholder="name@company.com" type="email" value="demo@fluxa.com"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Şifre</label>
<a class="text-[10px] font-bold text-primary hover:text-primary-container transition-colors uppercase tracking-wider" href="#">Şifremi Unuttum</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-8 pr-4 py-3 bg-transparent border-b-2 border-surface-container-high focus:border-primary focus:ring-0 text-on-surface font-medium transition-all" id="password" type="password" value="123456"/>
</div>
</div>
<div class="pt-4">
<button onclick="window.location.href='dashboard.html'" class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-lg shadow-lg hover:shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span>Giriş Yap</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-10 text-center space-y-4">
<p class="text-sm text-secondary">
                        Henüz hesabınız yok mu? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Kayıt Ol</a>
</p>
<div class="pt-6 border-t border-surface-container-high/50">
<div class="inline-flex items-center gap-2 px-3 py-1.5 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-sm text-primary" data-icon="info">info</span>
</div>
</div>
</div>
</div>
<div class="mt-12 flex justify-center gap-8">
<a class="text-xs font-medium text-outline hover:text-on-surface transition-colors" href="#">Gizlilik Politikası</a>
<a class="text-xs font-medium text-outline hover:text-on-surface transition-colors" href="#">Kullanım Koşulları</a>
<a class="text-xs font-medium text-outline hover:text-on-surface transition-colors" href="#">Destek</a>
</div>
</div>
<div class="hidden lg:block absolute right-[-10%] top-1/2 -translate-y-1/2 w-[30%] aspect-square">
<div class="w-full h-full rounded-3xl overflow-hidden opacity-20 grayscale hover:grayscale-0 hover:opacity-40 transition-all duration-1000 rotate-12 shadow-2xl">
<img class="w-full h-full object-cover" data-alt="industrial robot arm performing precision engineering tasks in a clean high-tech manufacturing facility with blue atmospheric lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBlrQdg9rMCvFNSP2qMQt_7RuDaHCMltF1_yeTeydE_YRSOiXRX26Wf8kuTmFauPcovHWv79FMCVsYVWLv7m2pph4wuCGuswOB34SJR37LjfBoRRxrSL-eIvuS-Z9c2u4e6km-eXXZ8QH_f43dR2zdzCXzfDxu8VpZAH_tnDJPp_n1LJFdmvkoCxzTNPkXyjOebItSw0LamEcpHFL1R4PzpphgxT74lU2mpmxpyppAwJXG3Q1QwXRfvPJ-4E68I1KSluA3PbtG-LtUE"/>
</div>
</div>
